# ─── AI Matching ──────────────────────────────────────────────────
ai:
  model: "gpt-4o-mini"
  years_experience: 5
  score_threshold: 7 # 0-10

  personal_summary: |
    AI / MLOps engineer with 4+ years building and deploying production AI computer
    vision and LLM systems, working fully remote on a globally distributed AI team.
    Handles the full ML lifecycle: model development, CI/CD, deployment, and production
    monitoring. Strong mechanical and software engineering foundation from a mechanical
    engineering background. Fast learner, comfortable picking up new tools, frameworks,
    and domains quickly. Collaborative across cross-cultural, cross-functional teams.

  work_experience:
    - title: "Senior ModelOps Engineer"
      company: "Trax Retail"
      duration: "Aug 2025 - Present"
      details: |
        - Led design and deployment of CI/CD pipelines automating the full ML lifecycle
          (data preprocessing, training, validation, deployment, analytics).
        - Developed an AI agent for Jira ticket triage using Generative AI, Camunda,
          AWS Bedrock, Claude, and RAG, reducing manual workload by 75%.
        - Built AI-powered monitoring dashboards to track live model performance and
          reliability in production; led diagnosis of underperforming models through
          statistical analysis, retraining, and hyperparameter tuning.
        - Modernized legacy services with FastAPI, MongoDB, and AWS Lambda, introducing
          unit testing, API redesign, and documentation standards.
        - Maintained the Image Recognition codebase; reviewed and approved code changes,
          enforcing coding standards and engineering best practices.

    - title: "ModelOps Engineer"
      company: "Trax Retail"
      duration: "May 2022 - Aug 2025"
      details: |
        - Developed, trained, and deployed AI computer vision models across 300+
          different client projects.
        - Built and deployed containerized ML workflows using Docker and Kubernetes,
          improving model reliability and portability across cloud-native environments.
        - Contributed to CI/CD pipeline development supporting data preprocessing,
          model training, and deployment workflows.
        - Core contributor and founding member of the global AI team, collaborating
          with engineers and data scientists across the organization.

    - title: "Software Engineer"
      company: "DevSoft Philippines"
      duration: "Apr 2021 - May 2022"
      details: |
        - Developed clean, maintainable, scalable C# solutions integrating DevExpress
          components across 100+ client-specific enterprise applications.
        - Led technical support and solution development for C#, ASP.NET Web Forms,
          ASP.NET MVC, and Blazor applications.
        - Provided expert technical consultation to enterprise clients on DevExpress
          UI components in production applications.
        - Authored 100+ technical code examples and implementation guides published
          on the DevExpress website.
        - Diagnosed, debugged, and resolved software defects while enhancing legacy
          codebases for performance, stability, and maintainability.

    - title: "Automation Equipment Field Service Engineer"
      company: "P.IMES Corporation"
      duration: "Jan 2020 - Apr 2021"
      details: |
        - Managed nationwide service operations across the Philippines for industrial
          automation systems: project execution, field service, customer support.
        - Assembled, commissioned, diagnosed, and troubleshot industrial robots and
          automated machinery.
        - Reduced operational costs by 50% by leading cross-functional projects and
          optimizing workflows.
        - Contributed to mechanical and electrical design of five custom industrial
          automation machines.
        - Developed standardized engineering procedures and built 10+ custom in-house
          tools, improving efficiency and productivity by 75%.

