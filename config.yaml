# ─── Search Preferences ───────────────────────────────────────────
search:
  keywords: ["job title 1", "job title 2"]
  locations: ["Preferred Location"]      # e.g. "Singapore", "Remote", "New York"
  max_results_per_site: 100
  sites: ["jobstreet"]

# ─── Resume Routing Rules ─────────────────────────────────────────
resumes:
  - file: "Resumes/Software_Resume.pdf"
    use_when:
      - default
      - software

  - file: "Resumes/AI_Resume.pdf"
    use_when:
      - ai
      - machine learning
      - llm
      - computer vision
      - data science

  - file: "Resumes/Engineering_Resume.pdf"
    use_when:
      - robotics
      - mechanical
      - mechatronics

# ─── AI Matching ──────────────────────────────────────────────────
ai:
  model: "gpt-4o-mini"
  years_experience: 6
  score_threshold: 7 # 0-10

  personal_summary: |
    Software engineer with 6 years of experience specializing in AI,
    Computer Vision, ModelOps, MLOps, backend development, cloud deployment,
    workflow automation, CI/CD, and machine learning production systems.
    Background also includes mechatronics/electrical engineering and robotics,
    giving strong fundamentals in embedded systems and hardware-software integration.

  work_experience:
    - title: "Software Engineer"
      company: "Company A"
      duration: "2022 - Present"
      details: |
        - Built and deployed computer vision pipelines for defect detection using OpenCV and PyTorch.
        - Designed MLOps workflows for model versioning, monitoring, and retraining on AWS.
        - Developed backend services with FastAPI and Django, integrated with PostgreSQL and MongoDB.
        - Set up CI/CD pipelines with Jenkins for automated testing and deployment.

    - title: "Junior Software Engineer"
      company: "Company B"
      duration: "2019 - 2022"
      details: |
        - Developed embedded software and ROS-based controls for robotics prototypes.
        - Built internal tooling and dashboards using React and Python.
        - Worked with SCADA systems for industrial automation and monitoring.

  skills:
    - Python
    - C++
    - C#
    - Django
    - FastAPI
    - React
    - Angular
    - AWS
    - GCP
    - Docker
    - MongoDB
    - PostgreSQL
    - OpenCV
    - Computer Vision
    - Machine Learning
    - ModelOps
    - MLOps
    - Git
    - Linux
    - CI/CD
    - Jenkins
    - Pytorch
    - scikit-learn
    - TensorFlow
    - RAG
    - LLM
    - Generative AI
    - Hyperparameter Tuning
    - microcontroller
    - robotics
    - mechanical engineering
    - mechatronics engineering
    - electrical engineering
    - ROS
    - SCADA
    - embedded software

  education:
    - degree: "BS Mechatronics Engineering"
      school: "Your University"
      year: "2018"

  languages:
    - English
    - Filipino

# ─── Banned Companies ─────────────────────────────────────────────
banned:
  companies:
    - Company Name 1
    - Company Name 2

# ─── Personal Info for Forms (non-sensitive) ──────────────────────
# NOTE: Email & passwords belong in the .env file.
personal:
  first_name: "First Name"
  last_name: "Last Name"
  middle_name: "Middle Name"
  phone: "+1234567890"
  linkedin: "https://www.linkedin.com/in/your-profile"
  github: "https://github.com/your-username"
  portfolio: "https://your-portfolio.com"
  work_auth: "need_sponsorship"   # yes / no / need_sponsorship

# ─── Application Settings ─────────────────────────────────────────
apply:
  auto_apply: false          # Recommended to start with false
  delay_between_apps: 3       # Seconds between applications
  max_apps_per_run: 100       # Safety limit
  headless: false             # false = browser visible

# ─── Web Dashboard ────────────────────────────────────────────────
dashboard:
  enabled: true
  host: "127.0.0.1"
  auto_open_browser: true