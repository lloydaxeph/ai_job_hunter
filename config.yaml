# ─── Search Preferences ───────────────────────────────────────────
search:
  keywords: ["job title 1", "job title 2"]
  locations: ["Preferred Location"]      # e.g. "Singapore", "Remote", "New York"
  max_results_per_site: 100
  sites: ["jobstreet"]

# ─── Resume Routing Rules ─────────────────────────────────────────
resumes:
  - file: "Resumes/Software_Resume.pdf"
    use_when:
      - default
      - software

  - file: "Resumes/AI_Resume.pdf"
    use_when:
      - ai
      - machine learning
      - llm
      - computer vision
      - data science

  - file: "Resumes/Engineering_Resume.pdf"
    use_when:
      - robotics
      - mechanical
      - mechatronics

# ─── AI Matching ──────────────────────────────────────────────────
ai:
  model: "gpt-4o-mini"
  years_experience: 5
  score_threshold: 7 # 0-10

  profile: |
    Briefly describe your professional background here.
    Include your years of experience, primary technologies,
    industries, and the types of roles you're targeting.

  skills:
    - Skill 1
    - Skill 2
    - Skill 3
    - Skill 4
    - Skill 5
    - Skill 6
    - Skill 7
    - Skill 8

# ─── Banned Companies ─────────────────────────────────────────────
banned:
  companies:
    - Company Name 1
    - Company Name 2

# ─── Personal Info for Forms (non-sensitive) ──────────────────────
# NOTE: Email & passwords belong in the .env file.
personal:
  first_name: "First Name"
  last_name: "Last Name"
  middle_name: "Middle Name"
  phone: "+1234567890"
  linkedin: "https://www.linkedin.com/in/your-profile"
  github: "https://github.com/your-username"
  portfolio: "https://your-portfolio.com"
  work_auth: "need_sponsorship"   # yes / no / need_sponsorship

# ─── Application Settings ─────────────────────────────────────────
apply:
  auto_apply: false          # Recommended to start with false
  delay_between_apps: 3       # Seconds between applications
  max_apps_per_run: 100       # Safety limit
  headless: false             # false = browser visible

# ─── Web Dashboard ────────────────────────────────────────────────
dashboard:
  enabled: true
  host: "127.0.0.1"
  auto_open_browser: true